<div class="public-page-shell register-page-shell">
  <header
    class="d-flex align-items-center justify-content-center p-3"
    style="background-color: #000; color: white"
  >
    <img src="/assets/logo.png" alt="Logo" class="public-header-logo" />
    <h1>Police Case Management</h1>
  </header>
  <div class="public-page-content register-page-content">
    <div class="container py-5">
      <h2 class="text-center mb-4">User registration</h2>
      <div class="col-md-8 col-lg-6 mx-auto">
        <div class="card register-form-card shadow">
          <div class="card-body p-4 p-md-5">
        <form (ngSubmit)="onSubmit()" novalidate>
          <div class="mb-3">
            <label class="form-label">Full name</label>
            <input
              type="text"
              name="fullname"
              class="form-control"
              [class.is-invalid]="errors.fullname"
              [ngModel]="formData.fullname"
              (ngModelChange)="onChangeName($event)"
              style="text-transform: uppercase"
              placeholder="Enter full name"
            />
            <div *ngIf="errors.fullname" class="invalid-feedback">{{ errors.fullname }}</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Police ID number</label>
            <input
              type="text"
              name="police_id"
              class="form-control"
              [class.is-invalid]="errors.police_id"
              [(ngModel)]="formData.police_id"
              placeholder="Enter police ID number"
            />
            <div *ngIf="errors.police_id" class="invalid-feedback">{{ errors.police_id }}</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Contact number</label>
            <input
              type="text"
              name="contact"
              class="form-control"
              [class.is-invalid]="errors.contact"
              [(ngModel)]="formData.contact"
              placeholder="Enter contact number"
            />
            <div *ngIf="errors.contact" class="invalid-feedback">{{ errors.contact }}</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input
              type="email"
              name="email"
              class="form-control"
              [class.is-invalid]="errors.email"
              [(ngModel)]="formData.email"
              placeholder="Enter email address"
            />
            <div *ngIf="errors.email" class="invalid-feedback">{{ errors.email }}</div>
          </div>
          <div class="mb-3">
            <label class="form-label">City / district</label>
            <select
              name="city"
              class="form-select"
              [class.is-invalid]="errors.city"
              [(ngModel)]="formData.city"
            >
              <option value="">Select your city/district</option>
              <option>Ahmedabad</option>
              <option>Amreli</option>
              <option>Anand</option>
              <option>Aravalli</option>
              <option>Banaskantha</option>
              <option>Bharuch</option>
              <option>Bhavnagar</option>
              <option>Botad</option>
              <option>Chhota Udaipur</option>
              <option>Dahod</option>
              <option>Dang</option>
              <option>Devbhoomi Dwarka</option>
              <option>Gandhinagar</option>
              <option>Gir Somnath</option>
              <option>Jamnagar</option>
              <option>Junagadh</option>
              <option>Kheda</option>
              <option>Kutch</option>
              <option>Mahisagar</option>
              <option>Mehsana</option>
              <option>Morbi</option>
              <option>Narmada</option>
              <option>Navsari</option>
              <option>Panchmahal</option>
              <option>Patan</option>
              <option>Porbandar</option>
              <option>Rajkot</option>
              <option>Sabarkantha</option>
              <option>Surat</option>
              <option>Surendranagar</option>
              <option>Tapi</option>
              <option>Vadodara</option>
              <option>Valsad</option>
            </select>
            <div *ngIf="errors.city" class="invalid-feedback">{{ errors.city }}</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input
              type="password"
              name="password"
              class="form-control"
              [class.is-invalid]="errors.password"
              [(ngModel)]="formData.password"
              placeholder="Create password"
            />
            <div *ngIf="errors.password" class="invalid-feedback">{{ errors.password }}</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm password</label>
            <input
              type="password"
              name="conf_password"
              class="form-control"
              [class.is-invalid]="errors.conf_password"
              [(ngModel)]="formData.conf_password"
              placeholder="Confirm password"
            />
            <div *ngIf="errors.conf_password" class="invalid-feedback">
              {{ errors.conf_password }}
            </div>
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" name="term_of_use" class="form-check-input" required />
            <label class="form-check-label"
              >I accept the <a routerLink="/terms">Terms &amp; Conditions</a>.</label
            >
          </div>
          <p>Already have an account? <a routerLink="/login">Login here</a>.</p>
          <button type="submit" class="btn btn-dark w-100 mt-3" [disabled]="loading">
            Register
          </button>
        </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <app-footer></app-footer>
</div>
