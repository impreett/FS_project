<div class="container mt-4">
  <div *ngIf="loading">Loading reports...</div>

  <ng-container *ngIf="!loading">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
      <h2 class="mb-0">All Reports</h2>
      <div class="d-flex justify-content-end align-items-center gap-2" *ngIf="reports.length > 1">
        <span class="fw-semibold">Sort:</span>
        <div
          class="sort-tabs"
          role="group"
          aria-label="Sort reports"
          [class.is-latest]="sortOrder === 'latest'"
          [class.is-oldest]="sortOrder === 'oldest'"
        >
          <button
            type="button"
            class="sort-btn"
            [class.active]="sortOrder === 'latest'"
            (click)="setSortOrder('latest')"
          >
            <span class="neu-text" aria-hidden="true">
              <span class="neu-text-primary"
                ><span>L</span><span>a</span><span>t</span><span>e</span><span>s</span
                ><span>t</span></span
              >
              <span class="neu-text-secondary"
                ><span>L</span><span>a</span><span>t</span><span>e</span><span>s</span
                ><span>t</span></span
              >
            </span>
            <span class="visually-hidden">Latest</span>
          </button>
          <button
            type="button"
            class="sort-btn"
            [class.active]="sortOrder === 'oldest'"
            (click)="setSortOrder('oldest')"
          >
            <span class="neu-text" aria-hidden="true">
              <span class="neu-text-primary"
                ><span>O</span><span>l</span><span>d</span><span>e</span><span>s</span
                ><span>t</span></span
              >
              <span class="neu-text-secondary"
                ><span>O</span><span>l</span><span>d</span><span>e</span><span>s</span
                ><span>t</span></span
              >
            </span>
            <span class="visually-hidden">Oldest</span>
          </button>
        </div>
      </div>
    </div>

    <ng-container *ngIf="groupedReports.length > 0; else empty">
      <ng-container *ngFor="let group of groupedReports">
        <h5 class="mb-3 text-secondary month-year-heading">{{ group.label }}</h5>
        <article *ngFor="let report of group.items" class="card mb-3">
          <div class="card-body">
            <p class="card-text mb-2"><b>From:</b> {{ report.email }}</p>
            <p class="card-text mb-2"><b>Date:</b> {{ report.date | date: 'medium' }}</p>
            <p class="card-text mt-2" style="white-space: pre-wrap">
              <b>Report: </b>{{ report.reportText }}
            </p>
            <button class="btn btn-danger" (click)="handleMarkAsRead(report._id)">Mark as read</button>
          </div>
        </article>
      </ng-container>
    </ng-container>
    <ng-template #empty>
      <div class="alert alert-info">No reports found.</div>
    </ng-template>
  </ng-container>
</div>
