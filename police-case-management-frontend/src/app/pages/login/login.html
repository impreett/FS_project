<div class="public-page-shell">
  <header
    class="d-flex align-items-center justify-content-center p-3"
    style="background-color: #000; color: white"
  >
    <img src="/assets/logo.png" alt="Logo" class="public-header-logo" />
    <h1>Police Case Management</h1>
  </header>
  <div class="public-page-content login-page-content">
    <div class="container py-5">
      <h2 class="text-center mb-4">User Login</h2>
      <div class="col-md-8 col-lg-6 mx-auto">
        <div class="card login-form-card shadow">
          <div class="card-body p-4 p-md-5">
        <form (ngSubmit)="onSubmit()" novalidate>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              name="email"
              class="form-control"
              [class.is-invalid]="errors.email"
              [(ngModel)]="formData.email"
              placeholder="Enter your email"
            />
            <div *ngIf="errors.email" class="error">{{ errors.email }}</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input
              type="password"
              name="password"
              class="form-control"
              [class.is-invalid]="errors.password"
              [(ngModel)]="formData.password"
              placeholder="Enter your password"
            />
            <div *ngIf="errors.password" class="error">{{ errors.password }}</div>
          </div>
          <p>Don't have an account? <a routerLink="/register">Register here</a>.</p>
          <button type="submit" class="btn btn-dark w-100 mt-3" [disabled]="loading">
            Login
          </button>
        </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <app-footer></app-footer>
</div>
