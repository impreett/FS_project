<div class="container mt-4" style="margin-bottom: 30px">
  <h2 class="mb-4">Users pending approval</h2>
  <div
    *ngIf="successMessage"
    class="alert alert-success alert-dismissible fade show text-center"
    role="alert"
  >
    {{ successMessage }}
    <button type="button" class="btn-close" (click)="successMessage = ''" aria-label="Close"></button>
  </div>

  <div *ngIf="loading">Loading...</div>

  <ng-container *ngIf="!loading">
    <ng-container *ngIf="users.length > 0; else empty">
      <article *ngFor="let user of users" class="card mb-3">
        <div class="card-body pending-user-layout">
          <div class="pending-user-meta">
            <h5 class="card-title">{{ user.fullname }}</h5>
            <p class="card-text mb-1"><b>Email:</b> {{ user.email }}</p>
            <p class="card-text mb-1"><b>Police ID:</b> {{ user.police_id }}</p>
            <p class="card-text mb-0"><b>City:</b> {{ user.city }}</p>
          </div>
          <div class="d-flex gap-2 pending-user-actions">
            <button class="pending-action-btn pending-approve-btn neu-button" (click)="handleApprove(user._id)">
              <span class="span-mother" aria-hidden="true">
                <span>A</span><span>p</span><span>p</span><span>r</span><span>o</span><span>v</span><span>e</span>
              </span>
              <span class="span-mother2" aria-hidden="true">
                <span>A</span><span>p</span><span>p</span><span>r</span><span>o</span><span>v</span><span>e</span>
              </span>
              <span class="visually-hidden">Approve</span>
            </button>
            <button class="pending-action-btn pending-reject-btn neu-button" (click)="handleDeny(user._id)">
              <span class="span-mother" aria-hidden="true">
                <span>D</span><span>e</span><span>n</span><span>y</span>
              </span>
              <span class="span-mother2" aria-hidden="true">
                <span>D</span><span>e</span><span>n</span><span>y</span>
              </span>
              <span class="visually-hidden">Deny</span>
            </button>
          </div>
        </div>
      </article>
    </ng-container>
    <ng-template #empty>
      <div class="alert alert-info">No users are currently pending approval.</div>
    </ng-template>
  </ng-container>
</div>
